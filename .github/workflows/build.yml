name: Build Multi-Platform

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            nasm-format: elf64
            output-name: hello-linux
          - os: windows-latest
            name: Windows
            nasm-format: win64
            output-name: hello-windows.exe

    runs-on: ${{ matrix.os }}
    name: Build for ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Create output directory
        run: mkdir -p outs

      - name: Assemble ASM (Linux)
        if: runner.os == 'Linux'
        run: nasm -f elf64 hello.asm -o outs/hello_asm.o

      - name: Compile C (Linux)
        if: runner.os == 'Linux'
        run: gcc -c hello.c -o outs/hello_c.o

      - name: Link (Linux)
        if: runner.os == 'Linux'
        run: gcc outs/hello_c.o outs/hello_asm.o -o outs/${{ matrix.output-name }}

      - name: Assemble ASM (Windows)
        if: runner.os == 'Windows'
        run: nasm -f ${{ matrix.nasm-format }} hello.asm -o outs\hello_asm.obj

      - name: Compile C (Windows)
        if: runner.os == 'Windows'
        run: gcc -c hello.c -o outs\hello_c.o

      - name: Link (Windows)
        if: runner.os == 'Windows'
        run: gcc outs\hello_c.o outs\hello_asm.obj -o outs\${{ matrix.output-name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: outs/${{ matrix.output-name }}
          retention-days: 30
